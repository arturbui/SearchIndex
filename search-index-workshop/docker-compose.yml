services:
  db:
    image: postgres:16
    container_name: search_workshop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workshop}
      POSTGRES_DB: ${POSTGRES_DB:-knuspr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Scripts here run ONCE, the first time the (empty) container boots.
      # We only set up extensions + the immutable_unaccent helper.
      # The products table is created by you (tutorial) or by `npm run seed`.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workshop} -d ${POSTGRES_DB:-knuspr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: search_workshop_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@workshop.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-workshop}
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      # Pre-registers the "db" server so students skip the connection dialog.
      - ./db/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
